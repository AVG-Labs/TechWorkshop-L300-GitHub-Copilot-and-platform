name: Build and Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push container image
        run: |
          docker build -f Dockerfile -t ${{ vars.ACR_NAME }}.azurecr.io/zava-storefront:${{ github.sha }} ./src
          docker push ${{ vars.ACR_NAME }}.azurecr.io/zava-storefront:${{ github.sha }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.APP_SERVICE_NAME }}
          images: ${{ vars.ACR_NAME }}.azurecr.io/zava-storefront:${{ github.sha }}
