# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: zava-storefront
metadata:
  template: zava-storefront-azd

services:
  web:
    project: ./src
    language: dotnet
    host: appservice
    docker:
      path: ./Dockerfile
      context: ./src

infra:
  provider: bicep
  path: ./infra
  module: main

